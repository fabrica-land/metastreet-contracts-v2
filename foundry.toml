[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
auto_detect_solc = true
optimizer = true
# viaIR + runs=800 mirrors upstream metastreet-contracts-v2's hardhat default;
# resolves "stack too deep" across the base Pool/logic libraries and the pool
# configurations.
via_ir = true
optimizer_runs = 800
evm_version = "cancun"
bytecode_hash = "None"
cbor_metadata = false

# Only the ERC1155 collection pool (the configuration Fabrica deploys) is grown
# by the ENG-31xx behavioral deltas past EIP-170's 24576-byte runtime limit at
# high optimizer runs, so it alone compiles at runs=1 to fit. The other upstream
# configurations keep the default runs and stay deployable at their own sizes.
[[profile.default.additional_compiler_profiles]]
name = "erc1155-size"
via_ir = true
optimizer_runs = 1
evm_version = "cancun"
bytecode_hash = "None"

[[profile.default.compilation_restrictions]]
paths = "contracts/configurations/WeightedRateERC1155CollectionPool.sol"
max_optimizer_runs = 1

# Per-chain external-library link addresses for the live Fabrica lending pool.
# WeightedRateERC1155CollectionPool links 4 libraries (BorrowLogic, DepositLogic,
# LiquidityLogic, ERC20DepositTokenFactory). forge cannot key `libraries` by chain,
# so per-chain linking is a named profile selected with FOUNDRY_PROFILE=<chain>,
# e.g. `FOUNDRY_PROFILE=mainnet forge script script/FabricaLendingPoolUpgrade.s.sol`.
# Named profiles inherit the default profile's compilation settings. Addresses are
# each chain's canonical, currently-live deployments (mainnet pool
# 0x842ffbf1ad5314503904626122376f71603a3cf9, beacon impl
# 0x4b1576Df8D8911d2F404391a7f8fAcEfA7F4b6da).
[profile.mainnet]
libraries = [
    "contracts/BorrowLogic.sol:BorrowLogic:0x6749f43BB2f4d5af0ce0fc3Fc4756Dc1d44F1d73",
    "contracts/DepositLogic.sol:DepositLogic:0xEc7716d72990374EB4E5f72f3B60179F5256d39B",
    "contracts/LiquidityLogic.sol:LiquidityLogic:0x07e2C0C066F231E57857B7fB3CD51E18D364AAB0",
    "contracts/tokenization/ERC20DepositTokenFactory.sol:ERC20DepositTokenFactory:0x08ccc36252f61983EE04fd5946eA958bC195090c",
]

[profile.sepolia]
libraries = [
    "contracts/BorrowLogic.sol:BorrowLogic:0x97bD28cd2EC4D226969221574f7EeBE301bf7557",
    "contracts/DepositLogic.sol:DepositLogic:0xcab821709338df0f718491d0f3038fbD6a16CfbE",
    "contracts/LiquidityLogic.sol:LiquidityLogic:0xc98899f5A7feFC5146C1574D6b51C0A5C993b505",
    "contracts/tokenization/ERC20DepositTokenFactory.sol:ERC20DepositTokenFactory:0x8722651F6f79Bde509c48Fc65c37A3b8faf9086D",
]

[fmt]
line_length = 120
