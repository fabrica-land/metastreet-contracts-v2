[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
auto_detect_solc = true
optimizer = true
# viaIR + runs=800 mirrors upstream metastreet-contracts-v2's hardhat default;
# resolves "stack too deep" across the base Pool/logic libraries and the pool
# configurations.
via_ir = true
optimizer_runs = 800
evm_version = "cancun"
bytecode_hash = "None"
cbor_metadata = false

# The ERC1155 collection pool (the configuration Fabrica deploys) is the size-
# sensitive one, so it compiles at runs=1.
#
# KNOWN GAP (ENG-3306): under this fork's forge/solc toolchain the deployable
# WeightedRateERC1155CollectionPool currently builds to 24,851 bytes runtime —
# 275 over EIP-170's 24,576-byte limit, so `forge build --sizes` FAILS on it.
# The live, Etherscan-verified Sepolia impl is 23,628 bytes; the origin
# fabrica-v3-contracts build reproduces that under the same forge 1.7.1, but this
# fork does not, and an exhaustive input diff (settings/source/OZ/solc all
# identical) has not isolated the delta. Reproducing a deployable artifact from
# this fork is a PREREQUISITE of any future pool upgrade and is tracked
# separately — it is NOT resolved here. Do not treat this fork as deploy-ready
# until that gap is closed.
[[profile.default.additional_compiler_profiles]]
name = "erc1155-size"
via_ir = true
optimizer_runs = 1
evm_version = "cancun"
bytecode_hash = "None"

[[profile.default.compilation_restrictions]]
paths = "contracts/configurations/WeightedRateERC1155CollectionPool.sol"
max_optimizer_runs = 1

# Sepolia external-library link addresses for the live Fabrica lending pool.
# WeightedRateERC1155CollectionPool links 4 libraries (BorrowLogic, DepositLogic,
# LiquidityLogic, ERC20DepositTokenFactory). forge cannot key `libraries` by chain,
# so per-chain linking is a named profile selected with FOUNDRY_PROFILE=sepolia,
# e.g. `FOUNDRY_PROFILE=sepolia forge script script/FabricaLendingPoolUpgrade.s.sol`.
# These are the live post-ENG-3231 Sepolia library deployments (see
# LENDING-POOL-RUNBOOK.md). There is NO Fabrica mainnet deployment — the mainnet
# lending pool (0x842Ffbf1AD5314503904626122376f71603A3Cf9) is MetaStreet's own
# and is not Fabrica-upgradable, so no [profile.mainnet] is provided here; the
# upstream mainnet library addresses are recorded in LENDING-POOL-RUNBOOK.md as
# reference only, NOT as valid link targets for a Fabrica-built impl.
[profile.sepolia]
libraries = [
    "contracts/BorrowLogic.sol:BorrowLogic:0x97bD28cd2EC4D226969221574f7EeBE301bf7557",
    "contracts/DepositLogic.sol:DepositLogic:0xcab821709338df0f718491d0f3038fbD6a16CfbE",
    "contracts/LiquidityLogic.sol:LiquidityLogic:0xc98899f5A7feFC5146C1574D6b51C0A5C993b505",
    "contracts/tokenization/ERC20DepositTokenFactory.sol:ERC20DepositTokenFactory:0x8722651F6f79Bde509c48Fc65c37A3b8faf9086D",
]

[fmt]
line_length = 120
# Upstream MetaStreet contracts (contracts/**) are preserved verbatim for
# auditability against upstream; do not reformat them.
ignore = ["contracts/**/*.sol"]
